<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Commandes — Riyaa's Collection</title>
    <meta name="robots" content="noindex">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/admin.css">
</head>
<body>

<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="logo">
            <span class="logo-main">Riyaa's</span>
            <span class="logo-sub">Administration</span>
        </div>
        <nav class="admin-nav">
            <a href="index.html">Produits</a>
            <a href="commandes.html" class="active">Commandes</a>
            <a href="demandes.html">Demandes</a>
            <a href="statistiques.html">Statistiques</a>
            <a href="../index.html" target="_blank">Voir la boutique</a>
            <a href="#" onclick="AdminAuth.logout(); return false;" class="logout">Déconnexion</a>
        </nav>
    </aside>

    <main class="admin-main">
        <h1 class="admin-title">Commandes</h1>

        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.8rem;">
            <div class="filter-pills" id="status-filters"></div>
            <div style="position:relative; margin-bottom:1rem;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="position:absolute; left:0.7rem; top:50%; transform:translateY(-50%); color:var(--mist); pointer-events:none;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="search" id="order-search" placeholder="N° commande, nom, téléphone…"
                       style="padding:0.45rem 0.8rem 0.45rem 2.1rem; border:1px solid var(--blush); font-family:var(--font-body); font-size:0.78rem; background:var(--white); width:250px;">
            </div>
        </div>

        <div id="orders-container">
            <p style="color:var(--mist); padding:2rem 0;">Chargement…</p>
        </div>
    </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="assets/admin.js"></script>
<script>
// Groupes de filtre : clé → statuts couverts (null = toutes)
const FILTER_GROUPS = {
    all:       { label: 'Toutes',   statuses: null },
    active:    { label: 'En cours', statuses: ['pending', 'deposit_paid', 'in_production', 'ready'] },
    delivered: { label: 'Livrées',  statuses: ['delivered'] },
    completed: { label: 'Terminées', statuses: ['completed'] },
    cancelled: { label: 'Annulées', statuses: ['cancelled'] },
};

let allOrders     = [];
let currentFilter = 'all';

document.addEventListener('DOMContentLoaded', async () => {
    await AdminAuth.requireAuth();
    document.getElementById('order-search').addEventListener('input', renderOrders);
    loadOrders();
});

async function loadOrders() {
    const container = document.getElementById('orders-container');
    try {
        const { data: orders } = await AdminAPI.orders();
        allOrders = orders;
        renderFilters();
        renderOrders();
    } catch (e) {
        container.innerHTML = `<p class="alert alert-error">Erreur de chargement : ${esc(e.message)}</p>`;
    }
}

function renderFilters() {
    document.getElementById('status-filters').innerHTML = Object.entries(FILTER_GROUPS).map(([key, g]) => {
        const count = g.statuses === null
            ? allOrders.length
            : allOrders.filter(o => g.statuses.includes(o.order_status)).length;
        return `<button class="filter-pill ${key === currentFilter ? 'active' : ''}" onclick="setFilter('${key}')">
            ${g.label} (${count})
        </button>`;
    }).join('');
}

function setFilter(key) {
    currentFilter = key;
    renderFilters();
    renderOrders();
}

function renderOrders() {
    const container = document.getElementById('orders-container');
    const group     = FILTER_GROUPS[currentFilter];
    const query     = document.getElementById('order-search').value.trim().toLowerCase();

    let orders = group.statuses === null
        ? allOrders
        : allOrders.filter(o => group.statuses.includes(o.order_status));

    if (query) {
        orders = orders.filter(o =>
            (o.order_number  || '').toLowerCase().includes(query) ||
            (o.customer_name || '').toLowerCase().includes(query) ||
            (o.customer_phone || '').replace(/\s/g, '').includes(query.replace(/\s/g, '')));
    }

    if (!allOrders.length) {
        container.innerHTML = '<p style="color:var(--mist); padding:2rem 0;">Aucune commande pour l\'instant.</p>';
        return;
    }
    if (!orders.length) {
        container.innerHTML = '<p style="color:var(--mist); padding:2rem 0;">Aucune commande ne correspond à ces critères.</p>';
        return;
    }

    container.innerHTML = orders.map(o => {
        const status  = ORDER_STATUSES[o.order_status] || { label: o.order_status, color: 'var(--mist)' };
        const payment = PAYMENT_STATUSES[o.payment_status] || { label: o.payment_status, color: 'var(--mist)' };
        const phoneWa = (o.customer_phone || '').replace(/[^0-9+]/g, '').replace(/^\+/, '');
        const canComplete = !['completed', 'cancelled'].includes(o.order_status);
        return `
            <div style="background:var(--white); border:1px solid var(--blush); margin-bottom:1.2rem;">

                <!-- En-tête commande -->
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; padding:1.2rem 1.5rem; border-bottom:1px solid var(--blush);">
                    <div>
                        <strong style="font-family:var(--font-display); font-size:1.1rem;">${esc(o.order_number)}</strong>
                        <span style="font-size:0.75rem; color:var(--mist); margin-left:1rem;">
                            ${new Date(o.created_at).toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' })}
                        </span>
                    </div>
                    <div style="display:flex; align-items:center; flex-wrap:wrap; gap:0.8rem;">
                        <span class="badge" style="background:${status.color};">${status.label}</span>
                        <select onchange="changeStatus(${o.id}, this)" title="Statut de la commande" style="padding:0.4rem 0.8rem; border:1px solid var(--blush); font-family:var(--font-body); font-size:0.78rem; background:var(--white); cursor:pointer;">
                            ${Object.entries(ORDER_STATUSES).map(([key, s]) =>
                                `<option value="${key}" ${key === o.order_status ? 'selected' : ''}>${s.label}</option>`).join('')}
                        </select>
                        <span class="badge" style="background:${payment.color};">${payment.label}</span>
                        <select onchange="changePayment(${o.id}, this)" title="Statut du paiement" style="padding:0.4rem 0.8rem; border:1px solid var(--blush); font-family:var(--font-body); font-size:0.78rem; background:var(--white); cursor:pointer;">
                            ${Object.entries(PAYMENT_STATUSES).map(([key, s]) =>
                                `<option value="${key}" ${key === o.payment_status ? 'selected' : ''}>${s.label}</option>`).join('')}
                        </select>
                        ${canComplete ? `
                        <button class="icon-btn" onclick="markCompleted(${o.id})" title="Marquer traitée" style="color:var(--success); border-color:var(--success);">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </button>` : ''}
                        <button class="icon-btn icon-btn-danger" onclick="deleteOrder(${o.id}, '${esc(o.order_number)}')" title="Supprimer la commande">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Corps -->
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; padding:1.2rem 1.5rem;">
                    <div>
                        <p style="font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--mist); margin-bottom:0.5rem;">Cliente</p>
                        <p style="font-size:0.9rem; font-weight:400;">${esc(o.customer_name)}</p>
                        <p style="font-size:0.82rem; color:var(--mist); display:flex; align-items:center; gap:0.4rem;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                            <span>${esc(o.customer_phone)}</span>
                            ${phoneWa ? `<a href="https://wa.me/${phoneWa}" target="_blank" rel="noopener" title="Contacter sur WhatsApp" style="display:inline-flex; align-items:center; color:#25D366;">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
                            </a>` : ''}
                        </p>
                        <p style="font-size:0.82rem; color:var(--mist); display:flex; align-items:center; gap:0.4rem;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            <span>${esc(o.delivery_city)}${o.delivery_address ? ' — ' + esc(o.delivery_address) : ''}</span>
                        </p>
                        ${o.delivery_deadline ? `<p style="font-size:0.82rem; color:var(--mist); display:flex; align-items:center; gap:0.4rem;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            <span>Livraison prévue : ${new Date(o.delivery_deadline).toLocaleDateString('fr-FR')}</span>
                        </p>` : ''}
                    </div>
                    <div>
                        <p style="font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--mist); margin-bottom:0.5rem;">Articles</p>
                        ${(o.items || []).map(i => `
                            <p style="font-size:0.82rem; margin-bottom:0.2rem;">
                                ${i.quantity} × ${esc(i.product_name)}${i.size ? ' (T. ' + esc(i.size) + ')' : ''}${i.color ? ' (' + esc(i.color) + ')' : ''}
                                — ${Number(i.subtotal).toLocaleString('fr-FR')} FCFA
                            </p>`).join('')}
                        <div style="border-top:1px solid var(--blush); margin-top:0.6rem; padding-top:0.6rem; font-size:0.85rem;">
                            <p><strong>Total : ${Number(o.total_amount).toLocaleString('fr-FR')} FCFA</strong></p>
                            <p style="color:var(--gold);">Acompte : ${Number(o.deposit_amount).toLocaleString('fr-FR')} FCFA</p>
                            <p style="color:var(--mist);">Solde : ${Number(o.balance_amount).toLocaleString('fr-FR')} FCFA</p>
                        </div>
                    </div>
                </div>
            </div>`;
    }).join('');
}

async function changeStatus(orderId, select) {
    const previous = select.dataset.previous || select.value;
    try {
        await AdminAPI.updateOrderStatus(orderId, select.value);
        loadOrders();
    } catch (e) {
        alert('Erreur : ' + e.message);
        select.value = previous;
    }
}

async function changePayment(orderId, select) {
    const previous = select.dataset.previous || select.value;
    try {
        await AdminAPI.updatePaymentStatus(orderId, select.value);
        loadOrders();
    } catch (e) {
        alert('Erreur : ' + e.message);
        select.value = previous;
    }
}

async function markCompleted(orderId) {
    try {
        await AdminAPI.updateOrderStatus(orderId, 'completed');
        loadOrders();
    } catch (e) {
        alert('Erreur : ' + e.message);
    }
}

async function deleteOrder(orderId, orderNumber) {
    if (!confirm(`Supprimer définitivement la commande ${orderNumber} ? Cette action est irréversible.`)) return;
    try {
        await AdminAPI.deleteOrder(orderId);
        loadOrders();
    } catch (e) {
        alert('Erreur : ' + e.message);
    }
}

function esc(str) {
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
}
</script>

</body>
</html>
