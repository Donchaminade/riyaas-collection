<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Connexion — Riyaa's Collection</title>
    <meta name="robots" content="noindex">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body>

<div class="login-page">
    <div class="login-card">
        <h1>Riyaa's</h1>
        <p class="sub">Administration</p>

        <div id="login-error" class="alert alert-error" style="display:none; text-align:left;"></div>

        <form id="login-form">
            <div class="form-group" style="text-align:left;">
                <label>Mot de passe</label>
                <input type="password" id="password" required autofocus autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; padding:0.9rem;" id="login-btn">
                Se connecter
            </button>
        </form>

        <p style="margin-top:2rem;">
            <a href="/" style="font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--mist);">
                ← Retour à la boutique
            </a>
        </p>
    </div>
</div>

<script src="/assets/js/config.js"></script>
<script src="/admin/assets/admin.js"></script>
<script>
// Si déjà connecté, rediriger vers le dashboard
AdminAuth.verify().then(valid => {
    if (valid) location.href = '/admin';
});

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn     = document.getElementById('login-btn');
    const errorEl = document.getElementById('login-error');

    btn.disabled    = true;
    btn.textContent = 'Connexion…';
    errorEl.style.display = 'none';

    try {
        await AdminAuth.login(document.getElementById('password').value);
        location.href = '/admin';
    } catch (err) {
        errorEl.textContent   = err.message || 'Mot de passe incorrect.';
        errorEl.style.display = 'block';
        btn.disabled    = false;
        btn.textContent = 'Se connecter';
    }
});
</script>

</body>
</html>
